<div class="login-container">
    <form class="form" #authForm="ngForm" (ngSubmit)="onSubmit($event)">
        <h2 class="title">{{ isLoginFlow ? 'Log In' : 'Register' }}</h2>

        <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <input type="text" 
                class="form-input" 
                id="username" 
                name="username" 
                [(ngModel)]="username" 
                required
            >
        </div>

        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" 
                class="form-input" 
                id="password" 
                name="password" 
                [(ngModel)]="password" 
                required
            >
        </div>

        <div *ngIf="!isLoginFlow" class="form-group">
            <label for="re-password" class="form-label">Repeat Password</label>
            <input type="password" 
                class="form-input" 
                id="re-password" 
                name="password" 
                [(ngModel)]="repeatPassword" 
                required
            >
        </div>
        <p class="error-message" *ngIf="errorMessage">{{errorMessage}}</p>
        <div class="buttons-container">
            <button type="submit">
                <span class="text">{{ isLoginFlow ? 'Claim your Throne' : 'Join the Nights Watch' }}</span>
            </button>
        </div>

        <a *ngIf="isLoginFlow" routerLink="/register" class="form-link">Don't have an account? Register here.</a>
    </form>
</div>
